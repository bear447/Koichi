<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語帳 — ISAT & TOEFL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Georgia',serif;background:#f5f2eb;display:flex;min-height:100vh}
#sidebar{width:200px;min-width:200px;background:#1a1a1a;height:100vh;position:fixed;top:0;left:0;overflow-y:auto;display:flex;flex-direction:column;z-index:10}
#sidebar-title{padding:20px 16px 12px;font-family:'Courier New',monospace;font-size:11px;letter-spacing:0.15em;color:#666;text-transform:uppercase;border-bottom:1px solid #2a2a2a}
#sidebar-list{flex:1;padding:8px 0}
.group-btn{display:block;width:100%;padding:9px 16px;text-align:left;font-family:'Courier New',monospace;font-size:12px;color:#888;background:transparent;border:none;cursor:pointer;border-left:2px solid transparent;transition:all 0.15s}
.group-btn:hover{color:#ccc;background:#222}
.group-btn.active{color:#f5f2eb;background:#222;border-left-color:#f5f2eb}
.group-btn .g-num{font-size:10px;color:#555;display:block;margin-top:1px}
.group-btn.active .g-num{color:#888}
#main{margin-left:200px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;min-height:100vh}
.top-label{font-family:'Courier New',monospace;font-size:11px;letter-spacing:0.2em;color:#999;text-transform:uppercase;margin-bottom:8px}
.prog-text{font-family:'Courier New',monospace;font-size:13px;color:#aaa;margin-bottom:10px}
.prog-bar{width:320px;height:2px;background:#ddd;margin-bottom:36px;border-radius:1px}
.prog-fill{height:2px;background:#333;border-radius:1px;transition:width 0.3s}
.card-wrap{width:320px;height:200px;perspective:1000px;cursor:pointer;margin-bottom:36px}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.45s cubic-bezier(.4,0,.2,1)}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:4px;display:flex;align-items:center;justify-content:center;padding:32px}
.card-front{background:#fff;border:1px solid #e0ddd6}
.card-back{background:#2c2c2c;border:1px solid #2c2c2c;transform:rotateY(180deg)}
.word{font-size:28px;color:#1a1a1a;font-weight:normal;text-align:center;letter-spacing:-0.01em}
.meaning{font-size:19px;color:#f5f2eb;font-weight:normal;text-align:center;line-height:1.4;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif}
.hint{font-size:12px;color:#bbb;font-family:'Courier New',monospace;margin-bottom:28px}
.btns{display:flex;gap:12px}
button.btn-next{font-family:'Courier New',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;padding:10px 24px;border-radius:2px;cursor:pointer;background:#1a1a1a;color:#f5f2eb;border:1px solid #1a1a1a;transition:background .15s}
button.btn-next:hover{background:#333}
button.btn-shuf{font-family:'Courier New',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;padding:10px 20px;border-radius:2px;cursor:pointer;background:transparent;color:#888;border:1px solid #ccc;transition:all .15s}
button.btn-shuf:hover{border-color:#888;color:#333}
.done-wrap{text-align:center}
.done-big{font-size:22px;color:#1a1a1a;margin-bottom:6px}
.done-sub{font-size:13px;color:#888;font-family:'Courier New',monospace;margin-bottom:20px}
#menu-toggle{display:none}
@media(max-width:640px){
  #sidebar{width:160px;min-width:160px;transform:translateX(-160px);transition:transform .25s}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0;padding:20px 16px}
  .card-wrap,.prog-bar{width:100%}
  #menu-toggle{display:block;position:fixed;top:12px;left:12px;z-index:20;background:#1a1a1a;color:#f5f2eb;border:none;padding:8px 12px;font-size:16px;border-radius:2px;cursor:pointer}
}
</style>
</head>
<body>
<button id="menu-toggle" onclick="toggleSidebar()">☰</button>
<nav id="sidebar">
  <div id="sidebar-title">単語帳</div>
  <div id="sidebar-list"></div>
</nav>
<main id="main">
  <div class="top-label" id="group-label">グループ 1</div>
  <div class="prog-text" id="prog-text">1 / 100</div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="card-wrap" onclick="flipCard()">
    <div class="card" id="card">
      <div class="card-face card-front"><div class="word" id="word-front"></div></div>
      <div class="card-face card-back"><div class="meaning" id="word-back"></div></div>
    </div>
  </div>
  <p class="hint" id="hint">タップでひっくり返す</p>
  <div class="btns" id="btns">
    <button class="btn-next" onclick="nextCard()">次へ →</button>
    <button class="btn-shuf" onclick="shuffleDeck()">シャッフル</button>
  </div>
  <div id="done-wrap" style="display:none" class="done-wrap">
    <div class="done-big">このグループ完了！</div>
    <div class="done-sub" id="done-sub"></div>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:4px">
      <button class="btn-shuf" onclick="shuffleDeck()">もう一度</button>
      <button class="btn-next" onclick="nextGroup()">次のグループ →</button>
    </div>
  </div>
</main>

let currentGroup=0,deck=[],idx=0,flipped=false;
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function buildSidebar(){
  const list=document.getElementById('sidebar-list');
  list.innerHTML='';
  GROUPS.forEach((g,i)=>{
    const start=i*100+1,end=start+g.length-1;
    const btn=document.createElement('button');
    btn.className='group-btn'+(i===0?' active':'');
    btn.id='g-btn-'+i;
    btn.innerHTML='グループ '+(i+1)+'<span class="g-num">'+start+'–'+end+'語</span>';
    btn.onclick=()=>selectGroup(i);
    list.appendChild(btn);
  });
}
function selectGroup(i){
  currentGroup=i;deck=[...GROUPS[i]];idx=0;flipped=false;
  document.querySelectorAll('.group-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.getElementById('group-label').textContent='グループ '+(i+1);
  showCard();
  document.getElementById('sidebar').classList.remove('open');
}
function shuffleDeck(){deck=shuffle(GROUPS[currentGroup]);idx=0;flipped=false;showCard();}
function showCard(){
  document.getElementById('card').style.display='block';
  document.getElementById('done-wrap').style.display='none';
  document.getElementById('btns').style.display='flex';
  document.getElementById('hint').style.display='block';
  renderCard();
}
function renderCard(){
  if(idx>=deck.length){showDone();return;}
  const[word,meaning]=deck[idx];
  document.getElementById('word-front').textContent=word;
  document.getElementById('word-back').textContent=meaning;
  document.getElementById('card').classList.remove('flipped');
  flipped=false;
  document.getElementById('hint').textContent='タップでひっくり返す';
  const pct=Math.round(idx/deck.length*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=(idx+1)+' / '+deck.length;
}
function flipCard(){
  if(idx>=deck.length)return;
  flipped=!flipped;
  document.getElementById('card').classList.toggle('flipped',flipped);
  document.getElementById('hint').textContent=flipped?'次へ → で次の単語へ':'タップでひっくり返す';
}
function nextCard(){idx++;renderCard();}
function nextGroup(){selectGroup(currentGroup<GROUPS.length-1?currentGroup+1:0);}
function showDone(){
  document.getElementById('card').style.display='none';
  document.getElementById('btns').style.display='none';
  document.getElementById('hint').style.display='none';
  document.getElementById('prog-fill').style.width='100%';
  document.getElementById('prog-text').textContent=deck.length+' / '+deck.length;
  document.getElementById('done-wrap').style.display='block';
  document.getElementById('done-sub').textContent='グループ '+(currentGroup+1)+'（'+deck.length+'語）終了';
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');}
buildSidebar();selectGroup(0);
